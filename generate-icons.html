<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>iJerkIt Icon Generator</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #1a1a1a; color: #fff; }
    h1 { color: #ff4500; }
    p { color: #ccc; }
    canvas { border: 1px solid #333; margin: 1rem; }
  </style>
</head>
<body>
  <h1>iJerkIt Icon Generator</h1>
  <p>Open this file in a browser. Icons will download automatically.</p>
  <p>Move <strong>icon-192.png</strong> and <strong>icon-512.png</strong> to the project root.</p>
  <div id="previews"></div>
  <script>
    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Dark background
      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(0, 0, size, size);

      // Orange circle
      ctx.fillStyle = '#ff4500';
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size * 0.43, 0, Math.PI * 2);
      ctx.fill();

      // "IJ" text
      ctx.fillStyle = '#0d0d0d';
      ctx.font = `900 ${Math.round(size * 0.42)}px "Arial Black", Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('IJ', size / 2, size / 2 + size * 0.02);

      return canvas;
    }

    function download(canvas, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    const previews = document.getElementById('previews');

    [192, 512].forEach((size, i) => {
      const canvas = drawIcon(size);
      canvas.title = `icon-${size}.png`;
      previews.appendChild(canvas);

      // Stagger downloads slightly
      setTimeout(() => {
        download(canvas, `icon-${size}.png`);
      }, i * 600 + 200);
    });
  </script>
</body>
</html>
